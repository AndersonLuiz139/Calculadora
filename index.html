<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calculadora</title>
  <link rel="stylesheet" href="assets/css/style.css">
  <link rel="shortcut icon" href="assets/img/favicon-16x16.png" type="image/x-icon">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
</head>
<body>

  <div class="app">
    <div class="calculator">
      <div class="top-bar">
      <span>Calculadora</span>
      <button class="theme-toggle">
        <i class="bi bi-moon"></i>
      </button>
    </div>
      <input type="text" class="display" readonly>
      <div class="buttons">
        <button>C</button>
        <button>(</button>
        <button>)</button>
        <button>/</button>
        <button>7</button>
        <button>8</button>
        <button>9</button>
        <button>*</button>
        <button>4</button>
        <button>5</button>
        <button>6</button>
        <button>-</button>
        <button>1</button>
        <button>2</button>
        <button>3</button>
        <button>+</button>
        <button>0</button>
        <button>.</button>
        <button>DEL</button>
        <button>=</button>
      </div>
    </div>
    <div class="history">
      <div class="history-header">
        <span>Histórico</span>
        <button class="clear-history"><i class="bi bi-trash"></i></button>
      </div>
      <ul class="history-list"></ul>
    </div>
  </div>

  <script src="assets/js/main.js"></script>
</body>
</html>
